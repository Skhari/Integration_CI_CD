name: Complete CI/CD Pipeline

on:
  push:
    branches: ["main"]

# The Security Badge: Giving permission to update the live website
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================
  # JOB 1: Continuous Integration (The Testing)
  # ==========================================
  test-code:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download my code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🧪 Run my tests
        run: npm test


  # ==========================================
  # JOB 2: Continuous Deployment (The Live Site)
  # ==========================================
  deploy-website:
    # THE SECRET BRIDGE: This tells Job 2 to wait and ONLY run if Job 1 succeeds.
    needs: test-code 
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download my code
        uses: actions/checkout@v4

      - name: 📦 Package the website files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: 🚀 Publish to the internet
        id: deployment
        uses: actions/deploy-pages@v4
